plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.frontline.shooter'

    defaultConfig {
        applicationId "com.frontline.shooter"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {}
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
